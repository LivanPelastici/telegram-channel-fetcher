name: Get Telegram Channel Last Message

on:
  workflow_dispatch:
    inputs:
      channel_url:
        description: 'Telegram channel URL or username'
        required: true
        type: string
      output_format:
        description: 'Output format (json/text)'
        required: false
        type: choice
        options:
          - json
          - text
        default: 'json'

jobs:
  get-last-message:
    runs-on: ubuntu-latest
    outputs:
      message_json: ${{ steps.get-message.outputs.message_json }}
      message_text: ${{ steps.get-message.outputs.message_text }}
      status: ${{ steps.get-message.outputs.status }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Get last message from channel
        id: get-message
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_URL: ${{ github.event.inputs.channel_url }}
          OUTPUT_FORMAT: ${{ github.event.inputs.output_format }}
        run: python scripts/get_last_message.py
      
      - name: Upload result as artifact
        uses: actions/upload-artifact@v4
        with:
          name: telegram-result
          path: |
            message_output.json
            message_output.txt
          retention-days: 1
