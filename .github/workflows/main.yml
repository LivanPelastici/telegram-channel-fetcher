name: Get Telegram Channel Last Message

on:
  workflow_dispatch:
    inputs:
      channel_url:
        description: 'Channel URL or username'
        required: true
        type: string
        default: ''
      output_format:
        description: 'Output format'
        required: false
        type: choice
        options:
          - json
          - text
        default: 'json'

jobs:
  get-message:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Get last message from channel
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          PHONE_NUMBER: ${{ secrets.TELEGRAM_PHONE }}
          CHANNEL_URL: ${{ github.event.inputs.channel_url }}
          OUTPUT_FORMAT: ${{ github.event.inputs.output_format }}
        run: python scripts/get_last_message.py
      
      - name: Upload result as artifact
        uses: actions/upload-artifact@v4
        with:
          name: telegram-message-${{ github.run_id }}
          path: |
            message_output.json
            message_output.txt
          retention-days: 1
      
      - name: Display result in log
        run: |
          echo "📱 Result:"
          cat message_output.json

  notify:
    needs: get-message
    if: ${{ secrets.NOTIFY_CHAT_ID != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: telegram-message-${{ github.run_id }}
      
      - name: Send notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          NOTIFY_CHAT_ID: ${{ secrets.NOTIFY_CHAT_ID }}
        run: |
          pip install requests
          python scripts/send_notification.py
